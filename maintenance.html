<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>高温大学駅伝 速報 - 準備中</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffaf1;
      --text: #1f1a17;
      --muted: #73675d;
      --accent: #b45309;
      --accent-2: #0f766e;
      --border: rgba(31, 26, 23, 0.12);
      --shadow: 0 24px 80px rgba(92, 58, 10, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(180, 83, 9, 0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.10), transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px;
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(180, 83, 9, 0.10);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: .06em;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.9;
      color: var(--muted);
      font-size: 1rem;
    }
    .note {
      margin-top: 26px;
      padding: 16px 18px;
      border-left: 4px solid var(--accent-2);
      background: rgba(15, 118, 110, 0.06);
      border-radius: 14px;
      color: var(--text);
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95em;
      background: rgba(0,0,0,0.05);
      padding: 0.12em 0.36em;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">UNDER CONSTRUCTION</div>
    <h1>高温大学駅伝 速報サイトは準備中です</h1>
    <p>現在、公開サイトは工事中ページに切り替えています。公開再開は <code>2026-07-23 00:00 JST</code> を予定しています。</p>
    <p>検証用の表示確認は、`preview=1` を付けた確認リンクで行ってください。公開面には表示されません。</p>
    <div class="note">
      こちらは準備中ページです。内部のデータ更新や表示確認は、GitHub Actions の実行結果と検証用 URL で確認します。
    </div>
  </main>
</body>
</html>
