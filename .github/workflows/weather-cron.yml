name: Weather Cron Jobs

on:
  schedule:
    - cron: "*/10 22-23 * * *"
    - cron: "*/10 0-10 * * *"
    - cron: "*/10 10-23 * * *"
    - cron: "*/10 0-1 * * *"
    - cron: "45 14 * * *"
    - cron: "5 15 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "realtime"
        type: choice
        options:
          - realtime
          - manager_comments
          - daily_commit
          - daily_summary
      mode:
        description: "Dispatch mode"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - test
      force:
        description: "Run even before the official start time"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weather-cron
  cancel-in-progress: false

env:
  START_AT_UTC: "2026-07-22T15:00:00Z"
  PROD_PUSH_API_URL: ${{ secrets.PROD_PUSH_API_URL }}
  API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          PROD_PUSH_API_URL: ${{ secrets.PROD_PUSH_API_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MISSING=""
          for var in PROD_PUSH_API_URL API_SECRET_KEY OPENAI_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "ERROR: $var is not set"
              MISSING="$MISSING $var"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing secrets:$MISSING"
            exit 1
          fi
          echo "All secrets are configured correctly"
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *'"${{ github.workflow }}"'* failed\nJob: validate\nRepo: ${{ github.repository }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"}' \
            "$SLACK_WEBHOOK_URL"

  realtime:
    needs: validate
    if: github.event_name == 'schedule' && (github.event.schedule == '*/10 22-23 * * *' || github.event.schedule == '*/10 0-10 * * *') || github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'realtime'
    runs-on: ubuntu-latest
    env:
      EKIDEN_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
      EKIDEN_DISABLE_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Configure Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run realtime update
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && [[ "$(date -u +%Y-%m-%dT%H:%M:%SZ)" < "${START_AT_UTC}" ]]; then
            echo "Skipped before start time."
            exit 0
          fi
          bash ./update_realtime.sh
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *'"${{ github.workflow }}"'* failed\nJob: realtime\nRepo: ${{ github.repository }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"}' \
            "$SLACK_WEBHOOK_URL"

  manager_comments:
    needs: validate
    if: github.event_name == 'schedule' && (github.event.schedule == '*/10 10-23 * * *' || github.event.schedule == '*/10 0-1 * * *') || github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'manager_comments'
    runs-on: ubuntu-latest
    env:
      EKIDEN_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
      EKIDEN_DISABLE_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Configure Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run manager comment update
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && [[ "$(date -u +%Y-%m-%dT%H:%M:%SZ)" < "${START_AT_UTC}" ]]; then
            echo "Skipped before start time."
            exit 0
          fi
          bash ./update_manager_comments.sh
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *'"${{ github.workflow }}"'* failed\nJob: manager_comments\nRepo: ${{ github.repository }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"}' \
            "$SLACK_WEBHOOK_URL"

  daily_commit:
    needs: validate
    if: github.event_name == 'schedule' && github.event.schedule == '45 14 * * *' || github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_commit'
    runs-on: ubuntu-latest
    env:
      EKIDEN_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
      EKIDEN_DISABLE_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Configure Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run daily commit
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && [[ "$(date -u +%Y-%m-%dT%H:%M:%SZ)" < "${START_AT_UTC}" ]]; then
            echo "Skipped before start time."
            exit 0
          fi
          bash ./commit_daily.sh
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *'"${{ github.workflow }}"'* failed\nJob: daily_commit\nRepo: ${{ github.repository }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"}' \
            "$SLACK_WEBHOOK_URL"

  daily_summary:
    needs: validate
    if: github.event_name == 'schedule' && (github.event.schedule == '5 15 * * *' || github.event.schedule == '0 15 * * *') || github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily_summary'
    runs-on: ubuntu-latest
    env:
      EKIDEN_TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
      EKIDEN_DISABLE_GIT_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Configure Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run daily summary
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && [[ "$(date -u +%Y-%m-%dT%H:%M:%SZ)" < "${START_AT_UTC}" ]]; then
            echo "Skipped before start time."
            exit 0
          fi
          bash ./commit_summary.sh
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *'"${{ github.workflow }}"'* failed\nJob: daily_summary\nRepo: ${{ github.repository }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"}' \
            "$SLACK_WEBHOOK_URL"
